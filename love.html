<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Formation Animation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050b14;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
        }

        /* Kotak Teks Log di Bagian Bawah */
        .log-box {
            position: absolute;
            bottom: 40px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 15px 25px;
            border-radius: 5px;
            color: #cbd5e1;
            font-size: 0.9rem;
            line-height: 1.5;
            pointer-events: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <!-- Canvas tempat partikel digambar -->
    <canvas id="heartCanvas"></canvas>

    <!-- Info Log Sesuai Tampilan Gambar -->
    <div class="log-box">
        // Dynamic Animation: Self-Forming Heart<br>
        // Step 1: Particles Converge (0.5s)<br>
        // Step 2: Shape Pulsation (0.3s)<br>
        // Step 3: Color Shift (0.8s)<br>
        // -- View source for full heart.js code --
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 1800; // Jumlah total partikel

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Rumus Matematika Bentuk Hati & Sayap
        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x * 12, y: -y * 12 }; // Skala ukuran hati
        }

        function getWingPoint(t, side) {
            let x = side * (Math.abs(t) * 15 + Math.pow(Math.abs(t), 2) * 5);
            let y = -Math.sin(t * 3) * 30 + Math.pow(t, 2) * 10;
            return { x: x, y: y - 50 };
        }

        // Cetak Cetakan Titik Target
        const targets = [];
        for (let i = 0; i < particleCount; i++) {
            let p;
            if (i < particleCount * 0.5) {
                // 50% partikel membentuk hati
                let t = (i / (particleCount * 0.5)) * Math.PI * 2;
                p = getHeartPoint(t);
            } else {
                // 50% partikel membentuk sayap kiri & kanan
                let side = (i % 2 === 0) ? 1 : -1;
                let t = (i / particleCount) * Math.PI * 2;
                p = getWingPoint(t, side);
            }
            targets.push(p);
        }

        // Blueprint Objek Partikel
        class Particle {
            constructor(target, index) {
                // Partikel muncul acak dari luar layar terlebih dahulu
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.targetX = target.x;
                this.targetY = target.y;
                
                // Variasi Warna (Pink, Ungu, Emas menyala)
                let r = Math.floor(200 + Math.random() * 55);
                let g = Math.floor(50 + Math.random() * 150);
                let b = Math.floor(150 + Math.random() * 105);
                this.baseColor = `rgba(${r}, ${g}, ${b},`;
                
                this.size = Math.random() * 2 + 0.5;
                this.speed = 0.04 + Math.random() * 0.04;
                this.angle = Math.random() * Math.PI * 2;
                this.index = index;
            }

            update(time) {
                // Pusat koordinat animasi tepat di tengah layar
                let centerX = width / 2;
                let centerY = height / 2 - 30;

                // Efek Detak Jantung Dinamis (Pulse)
                let pulse = 1 + Math.sin(time * 5) * 0.06;

                let tx = centerX + this.targetX * pulse;
                let ty = centerY + this.targetY * pulse;

                // Tambahkan efek kepakan sayap tipis lewat rumus wave sin
                if (Math.abs(this.targetX) > 150) {
                    ty += Math.sin(time * 4 + this.targetX * 0.01) * 15;
                }

                // Gerakan partikel mendekati target posisi (Converge)
                this.x += (tx - this.x) * this.speed;
                this.y += (ty - this.y) * this.speed;
            }

            draw() {
                // Efek kilau transparansi berubah lembut
                let alpha = 0.4 + Math.sin(this.x * 0.05 + this.y * 0.05) * 0.4;
                ctx.fillStyle = this.baseColor + alpha + ")";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Inisialisasi Partikel
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle(targets[i], i));
        }

        // Tambah teks nama "Arif" di tengah bawah hati menggunakan Canvas Text
        function drawName() {
            ctx.font = "italic 42px 'Brush Script MT', cursive, sans-serif";
            ctx.textAlign = "center";
            
            // Reset efek glow agar tidak merusak partikel biasa
            ctx.shadowBlur = 0;
        }

        // Loop Animasi Berjalan Terus-menerus
        function animate(timestamp) {
            let time = timestamp * 0.001;
            
            // Membersihkan sisa partikel sebelumnya dengan efek trail samar (blur halus)
            ctx.fillStyle = "rgba(5, 11, 20, 0.25)";
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update(time);
                p.draw();
            });

            drawName();
            requestAnimationFrame(animate);
        }

        // Mulai animasi
        requestAnimationFrame(animate);
    </script>
</body>
</html>
